version: '3.9'

services:
  n8n:
    image: n8nio/n8n:1.83.2
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-32-char-secret-key!!}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      # Use SQLite for n8n internal DB (no Postgres needed)
      - DB_TYPE=sqlite
      - EXECUTIONS_MODE=regular
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-replace-me}
      # Google Sheets (primary database)
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-replace-me}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}
    volumes:
      - n8n_data:/home/node/.n8n

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pos-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.pos-api
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${POS_API_PORT:-3099}:3099"
    environment:
      - POS_API_PORT=3099
      - POS_API_KEY=${POS_API_KEY:-}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-replace-me}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}

volumes:
  n8n_data:
  redis_data:
